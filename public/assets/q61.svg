<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="black" />
    </marker>
  </defs>

  <text x="50" y="30" font-family="Arial" font-size="20">Problem Figures:</text>
  
  <!-- Problem Row -->
  <g transform="translate(50, 50)">
      <!-- Box 1: 1 Arrow North -->
      <g>
          <rect x="0" y="0" width="100" height="100" fill="none" stroke="black" stroke-width="2"/>
          <line x1="50" y1="80" x2="50" y2="20" stroke="black" stroke-width="2" marker-end="url(#arrowhead)"/>
          <path d="M50 50 L50 20 L45 25 M50 20 L55 25" fill="none" stroke="black" stroke-width="2" style="display:none" /> <!-- Fallback arrow head if marker fails -->
      </g>
      
      <!-- Box 2: 2 Arrows East -->
      <g transform="translate(110, 0)">
          <rect x="0" y="0" width="100" height="100" fill="none" stroke="black" stroke-width="2"/>
          <line x1="20" y1="40" x2="80" y2="40" stroke="black" stroke-width="2" marker-end="url(#arrowhead)"/>
          <line x1="20" y1="60" x2="80" y2="60" stroke="black" stroke-width="2" marker-end="url(#arrowhead)"/>
      </g>
      
      <!-- Box 3: 3 Arrows South -->
      <g transform="translate(220, 0)">
          <rect x="0" y="0" width="100" height="100" fill="none" stroke="black" stroke-width="2"/>
          <line x1="30" y1="20" x2="30" y2="80" stroke="black" stroke-width="2" marker-end="url(#arrowhead)"/>
          <line x1="50" y1="20" x2="50" y2="80" stroke="black" stroke-width="2" marker-end="url(#arrowhead)"/>
          <line x1="70" y1="20" x2="70" y2="80" stroke="black" stroke-width="2" marker-end="url(#arrowhead)"/>
      </g>

      <!-- Box 4: Question Mark -->
      <g transform="translate(330, 0)">
          <rect x="0" y="0" width="100" height="100" fill="none" stroke="black" stroke-width="2"/>
          <text x="35" y="65" font-family="Arial" font-size="40">?</text>
      </g>
  </g>

  <text x="50" y="200" font-family="Arial" font-size="20">Answer Figures:</text>
  
  <!-- Options -->
  <g transform="translate(50, 230)">
      <!-- Option 1: 4 Arrows West -->
      <g>
         <text x="-30" y="50" font-family="Arial" font-size="16">(1)</text>
         <rect width="100" height="100" fill="none" stroke="black" stroke-width="2"/>
         <line x1="80" y1="20" x2="20" y2="20" stroke="black" stroke-width="2" marker-end="url(#arrowhead)"/>
         <line x1="80" y1="40" x2="20" y2="40" stroke="black" stroke-width="2" marker-end="url(#arrowhead)"/>
         <line x1="80" y1="60" x2="20" y2="60" stroke="black" stroke-width="2" marker-end="url(#arrowhead)"/>
         <line x1="80" y1="80" x2="20" y2="80" stroke="black" stroke-width="2" marker-end="url(#arrowhead)"/>
      </g>
      
      <!-- Option 2: 4 Arrows North -->
      <g transform="translate(150, 0)">
         <text x="-30" y="50" font-family="Arial" font-size="16">(2)</text>
         <rect width="100" height="100" fill="none" stroke="black" stroke-width="2"/>
         <line x1="20" y1="80" x2="20" y2="20" stroke="black" stroke-width="2" marker-end="url(#arrowhead)"/>
         <line x1="40" y1="80" x2="40" y2="20" stroke="black" stroke-width="2" marker-end="url(#arrowhead)"/>
         <line x1="60" y1="80" x2="60" y2="20" stroke="black" stroke-width="2" marker-end="url(#arrowhead)"/>
         <line x1="80" y1="80" x2="80" y2="20" stroke="black" stroke-width="2" marker-end="url(#arrowhead)"/>
      </g>
      
      <!-- Option 3: 3 Arrows West -->
      <g transform="translate(300, 0)">
         <text x="-30" y="50" font-family="Arial" font-size="16">(3)</text>
         <rect width="100" height="100" fill="none" stroke="black" stroke-width="2"/>
         <line x1="80" y1="30" x2="20" y2="30" stroke="black" stroke-width="2" marker-end="url(#arrowhead)"/>
         <line x1="80" y1="50" x2="20" y2="50" stroke="black" stroke-width="2" marker-end="url(#arrowhead)"/>
         <line x1="80" y1="70" x2="20" y2="70" stroke="black" stroke-width="2" marker-end="url(#arrowhead)"/>
      </g>

      <!-- Option 4: 5 Arrows West -->
      <g transform="translate(450, 0)">
         <text x="-30" y="50" font-family="Arial" font-size="16">(4)</text>
         <rect width="100" height="100" fill="none" stroke="black" stroke-width="2"/>
         <line x1="80" y1="15" x2="20" y2="15" stroke="black" stroke-width="2" marker-end="url(#arrowhead)"/>
         <line x1="80" y1="30" x2="20" y2="30" stroke="black" stroke-width="2" marker-end="url(#arrowhead)"/>
         <line x1="80" y1="50" x2="20" y2="50" stroke="black" stroke-width="2" marker-end="url(#arrowhead)"/>
         <line x1="80" y1="70" x2="20" y2="70" stroke="black" stroke-width="2" marker-end="url(#arrowhead)"/>
         <line x1="80" y1="85" x2="20" y2="85" stroke="black" stroke-width="2" marker-end="url(#arrowhead)"/>
      </g>
  </g>
</svg>
