<svg width="800" height="200" xmlns="http://www.w3.org/2000/svg">
  <text x="20" y="30" font-family="Arial" font-size="20">Choose the figure which is different from the others:</text>
  
  <g transform="translate(50, 60)">
      <!-- Option 1: Triangle in Square -->
      <g>
         <text x="-30" y="55" font-family="Arial" font-size="16">(1)</text>
         <rect x="0" y="0" width="100" height="100" fill="none" stroke="black" stroke-width="2"/>
         <!-- Square Outer -->
         <rect x="20" y="20" width="60" height="60" fill="none" stroke="black" stroke-width="2"/>
         <!-- Triangle Inner -->
         <polygon points="50,30 75,70 25,70" fill="none" stroke="black" stroke-width="2"/>
      </g>
      
      <!-- Option 2: Square in Pentagon -->
      <g transform="translate(150, 0)">
         <text x="-30" y="55" font-family="Arial" font-size="16">(2)</text>
         <rect x="0" y="0" width="100" height="100" fill="none" stroke="black" stroke-width="2"/>
         <!-- Pentagon Outer -->
         <polygon points="50,20 80,40 70,80 30,80 20,40" fill="none" stroke="black" stroke-width="2"/>
         <!-- Square Inner -->
         <rect x="35" y="45" width="30" height="30" fill="none" stroke="black" stroke-width="2"/>
      </g>
      
      <!-- Option 3: Pentagon in Hexagon -->
      <g transform="translate(300, 0)">
         <text x="-30" y="55" font-family="Arial" font-size="16">(3)</text>
         <rect x="0" y="0" width="100" height="100" fill="none" stroke="black" stroke-width="2"/>
         <!-- Hexagon Outer -->
         <polygon points="50,20 80,35 80,65 50,80 20,65 20,35" fill="none" stroke="black" stroke-width="2"/>
         <!-- Pentagon Inner -->
         <polygon points="50,35 65,45 60,65 40,65 35,45" fill="none" stroke="black" stroke-width="2"/>
      </g>
      
      <!-- Option 4: Hexagon in Octagon (Diff 2) -->
      <g transform="translate(450, 0)">
         <text x="-30" y="55" font-family="Arial" font-size="16">(4)</text>
         <rect x="0" y="0" width="100" height="100" fill="none" stroke="black" stroke-width="2"/>
         <!-- Octagon Outer -->
         <polygon points="35,20 65,20 80,35 80,65 65,80 35,80 20,65 20,35" fill="none" stroke="black" stroke-width="2"/>
         <!-- Hexagon Inner -->
         <polygon points="50,35 65,42 65,58 50,65 35,58 35,42" fill="none" stroke="black" stroke-width="2"/>
      </g>
  </g>
</svg>
